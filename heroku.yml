build:
  docker:
    web: Dockerfile
run:
  web: sh -c "exec python -m gunicorn mediaflow_proxy.main:app -w \"${WEB_CONCURRENCY:-${GUNICORN_WORKERS:-4}}\" -k \"${GUNICORN_WORKER_CLASS:-uvicorn.workers.UvicornWorker}\" --bind \"${GUNICORN_BIND:-0.0.0.0:${PORT:-8888}}\" --timeout \"${GUNICORN_TIMEOUT:-120}\" --max-requests \"${GUNICORN_MAX_REQUESTS:-500}\" --max-requests-jitter \"${GUNICORN_MAX_REQUESTS_JITTER:-200}\" --access-logfile \"${GUNICORN_ACCESS_LOGFILE:--}\" --error-logfile \"${GUNICORN_ERROR_LOGFILE:--}\" --log-level \"${GUNICORN_LOG_LEVEL:-info}\" --forwarded-allow-ips \"${FORWARDED_ALLOW_IPS:-*}\""
